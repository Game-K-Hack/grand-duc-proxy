name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-proxy:
    name: Build proxy (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: grand-duc-proxy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: grand-duc-proxy.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build proxy (release)
        working-directory: proxy
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload proxy artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-${{ matrix.target }}
          path: proxy/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          VITE_APP_VERSION=${GITHUB_REF_NAME} npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  package-release:
    name: Package & publish release
    needs: [build-proxy, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package Linux bundle
        run: |
          mkdir -p bundle-linux/SQL bundle-linux/backend bundle-linux/frontend bundle-linux/docker
          # Proxy binary
          cp artifacts/proxy-x86_64-unknown-linux-gnu/grand-duc-proxy bundle-linux/
          chmod +x bundle-linux/grand-duc-proxy
          # Backend
          cp -r backend/* bundle-linux/backend/
          rm -f bundle-linux/backend/.env
          # Frontend (pre-built)
          cp -r artifacts/frontend-dist bundle-linux/frontend/dist
          # SQL migrations
          cp SQL/*.sql bundle-linux/SQL/
          # Docker files
          cp docker-compose.yml bundle-linux/
          cp docker/docker-init-db.sh bundle-linux/docker/
          cp docker/*.Dockerfile bundle-linux/docker/
          # Config
          cp .env.docker bundle-linux/.env.example
          cp .dockerignore bundle-linux/
          # Start script
          cat > bundle-linux/start.sh << 'SHEOF'
          #!/bin/bash
          set -e
          echo "=== Grand-Duc -- Demarrage ==="

          # 1. Detection de Python 3.12 ou 3.11
          PYTHON_CMD=""
          if command -v python3.12 &>/dev/null; then
              PYTHON_CMD="python3.12"
              echo "[INFO] Python 3.12 detecte."
          elif command -v python3.11 &>/dev/null; then
              PYTHON_CMD="python3.11"
              echo "[INFO] Python 3.11 detecte."
          elif command -v python3 &>/dev/null; then
              PY_VER=$(python3 --version 2>&1 | grep -oP '3\.\d+')
              if [[ "$PY_VER" == "3.11" || "$PY_VER" == "3.12" ]]; then
                  PYTHON_CMD="python3"
                  echo "[INFO] Python $PY_VER detecte."
              fi
          fi

          if [ -z "$PYTHON_CMD" ]; then
              echo "[ERREUR] Python 3.11 ou 3.12 requis."
              exit 1
          fi

          # 2. Gestion du .env
          if [ ! -f ".env" ] && [ -f ".env.example" ]; then
              echo "[INFO] Copie de .env.example vers .env -- adaptez les valeurs."
              cp .env.example .env
          fi

          # Charger les variables
          set -a; source .env; set +a

          # 3. Environnement virtuel
          if [ ! -d "venv" ]; then
              echo "[1/4] Creation de l'environnement virtuel..."
              $PYTHON_CMD -m venv venv
          fi

          echo "[1/4] Mise a jour des dependances..."
          venv/bin/python -m pip install -q --upgrade pip
          venv/bin/python -m pip install -q -r backend/requirements.txt

          # 4. Verification PostgreSQL
          echo "[2/4] Verification de PostgreSQL..."
          until pg_isready -h "${PGHOST:-localhost}" -U "${POSTGRES_USER:-hibou}" -d "${POSTGRES_DB:-grand_duc}" 2>/dev/null; do
              echo "  En attente de PostgreSQL..."
              sleep 2
          done

          # 5. Migrations
          echo "[3/4] Application des migrations..."
          psql -U "${POSTGRES_USER:-hibou}" -d "${POSTGRES_DB:-grand_duc}" -f SQL/init.sql 2>/dev/null || true
          for f in $(ls SQL/migration_v*.sql 2>/dev/null | sort -t 'v' -k2 -n); do
              psql -U "${POSTGRES_USER:-hibou}" -d "${POSTGRES_DB:-grand_duc}" -f "$f" 2>/dev/null || true
          done
          echo "  Migrations OK."

          # 6. Demarrage
          echo "[4/4] Demarrage des services..."
          cd backend
          ../venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          BACKEND_PID=$!
          cd ..

          chmod +x ./grand-duc-proxy
          ./grand-duc-proxy &
          PROXY_PID=$!

          echo ""
          echo "=== Grand-Duc est pret ==="
          echo "  Proxy   : http://localhost:${PROXY_ADDR##*:}"
          echo "  Backend : http://localhost:8000"
          echo "  Frontend: servir frontend/dist/ avec nginx ou un serveur statique"
          echo ""
          echo "Ctrl+C pour arreter."

          trap "kill $BACKEND_PID $PROXY_PID 2>/dev/null; exit 0" INT TERM
          wait
          SHEOF
          chmod +x bundle-linux/start.sh
          cd bundle-linux && tar czf ../grand-duc-linux-amd64.tar.gz . && cd ..

      - name: Package Windows bundle
        run: |
          mkdir -p bundle-windows/SQL bundle-windows/backend bundle-windows/frontend
          # Proxy binary
          cp artifacts/proxy-x86_64-pc-windows-msvc/grand-duc-proxy.exe bundle-windows/
          # Backend
          cp -r backend/* bundle-windows/backend/
          rm -f bundle-windows/backend/.env
          # Frontend (pre-built)
          cp -r artifacts/frontend-dist bundle-windows/frontend/dist
          # SQL migrations
          cp SQL/*.sql bundle-windows/SQL/
          # Config
          cp .env.docker bundle-windows/.env.example
          # Start script
          cat > bundle-windows/start.bat << 'BATEOF'
          @echo off
          setlocal enabledelayedexpansion
          echo === Grand-Duc -- Demarrage ===

          :: 1. Detection de Python 3.12 ou 3.11
          set "PYTHON_CMD="

          py -3.12 --version >NUL 2>&1
          if %errorlevel% equ 0 (
              set "PYTHON_CMD=py -3.12"
              echo [INFO] Python 3.12 detecte via le launcher.
          ) else (
              py -3.11 --version >NUL 2>&1
              if %errorlevel% equ 0 (
                  set "PYTHON_CMD=py -3.11"
                  echo [INFO] Python 3.11 detecte via le launcher.
              )
          )

          if "%PYTHON_CMD%"=="" (
              python --version 2>NUL | findstr /R "3\.11\. 3\.12\." >NUL
              if !errorlevel! equ 0 (
                  set "PYTHON_CMD=python"
                  echo [INFO] Python compatible detecte via la commande standard.
              )
          )

          if "%PYTHON_CMD%"=="" (
              echo [ERREUR] Python 3.11 ou 3.12 n'a pas ete detecte.
              echo Veuillez installer Python 3.11 ou 3.12.
              pause
              exit /b
          )

          :: 2. Gestion du .env
          if not exist ".env" (
              if exist ".env.example" (
                  echo [INFO] Copie de .env.example vers .env
                  copy ".env.example" ".env" >NUL
              )
          )

          :: 3. Gestion de l'environnement virtuel
          if not exist "venv" (
              echo [1/3] Creation de l'environnement virtuel avec %PYTHON_CMD%...
              %PYTHON_CMD% -m venv venv
          )

          echo [1/3] Mise a jour des dependances...
          "venv\Scripts\python.exe" -m pip install -q --upgrade pip
          "venv\Scripts\python.exe" -m pip install -q -r "backend\requirements.txt"

          echo [2/3] Demarrage du backend...
          start /B "" cmd /c "cd /d backend && ..\venv\Scripts\python.exe -m uvicorn main:app --host 0.0.0.0 --port 8000"

          echo [3/3] Demarrage du proxy...
          if exist "grand-duc-proxy.exe" (
              start /B "" "grand-duc-proxy.exe"
          )

          echo.
          echo === Grand-Duc est pret ===
          echo   Proxy   : http://localhost:8080
          echo   Backend : http://localhost:8000
          echo.
          pause
          BATEOF
          cd bundle-windows && zip -r ../grand-duc-windows-amd64.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            grand-duc-linux-amd64.tar.gz
            grand-duc-windows-amd64.zip
